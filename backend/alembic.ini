# =============================================================================
# QAForge — Alembic Configuration
# =============================================================================
# Usage:
#   alembic upgrade head          # apply all migrations
#   alembic revision --autogenerate -m "description"  # create migration
#   alembic stamp head            # mark DB as current (existing DB)
#   alembic history               # show migration history
# =============================================================================

[alembic]
# Path to migration scripts (relative to this file)
script_location = migrations

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Truncate long revision identifiers in filenames
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files in the versions directory
sourceless = false

# Version file write format: raw SQL or Python
output_encoding = utf-8

# Database URL — overridden by DATABASE_URL env var in migrations/env.py
# This is a fallback only; production always uses the env var.
sqlalchemy.url = postgresql://qaforge:qaforge_pass@localhost:5434/qaforge

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
